<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Click Tracker</title>
</head>
<body style="text-align:center; margin-top:50px; font-family:sans-serif;">

  <h1>Click Tracker</h1>

  <input id="username" placeholder="Enter username">
  <br><br>

  <button onclick="sendData()">Click Me</button>

  <p id="status"></p>

  <script>
    async function sendData() {
      const username = document.getElementById("username").value;

      try {
        const res = await fetch("https://gentle-islands-camp.loca.lt/collect", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username: username,
            time: new Date().toISOString()
          })
        });

        const data = await res.json();
        document.getElementById("status").textContent = "✅ Sent successfully!";
      } catch (err) {
        console.error(err);
        document.getElementById("status").textContent = "❌ Failed to send";
      }
    }
  </script>

</body>
</html>
